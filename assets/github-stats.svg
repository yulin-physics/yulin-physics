<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-labelledby="title desc">
  <title id="title">GitHub stats placeholder</title>
  <desc id="desc">Placeholder image until the GitHub Actions workflow refreshes the README assets.</desc>
  <rect width="495" height="195" rx="12" fill="#F7FBF1" />
  <rect x="1" y="1" width="493" height="193" rx="11" fill="none" stroke="#DDE5B6" />
  <text x="28" y="52" fill="#5F7A61" font-family="Verdana, sans-serif" font-size="24" font-weight="700">GitHub Stats</text>
  <text x="28" y="92" fill="#2F3E2C" font-family="Verdana, sans-serif" font-size="15">Profile card will be regenerated by GitHub Actions.</text>
  <text x="28" y="122" fill="#6B705C" font-family="Verdana, sans-serif" font-size="13">Run the "Update README Assets" workflow or wait for the daily schedule.</text>
  <circle cx="40" cy="154" r="7" fill="#7CA982" />
  <text x="58" y="159" fill="#5F7A61" font-family="Verdana, sans-serif" font-size="13">assets/github-stats.svg</text>
</svg>
