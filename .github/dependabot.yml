version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
      - security
    commit-message:
      prefix: "chore"
      include: scope
