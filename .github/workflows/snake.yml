name: Update README Assets

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true&hide_border=true&bg_color=00000000&title_color=5F7A61&text_color=2F3E2C&icon_color=7CA982&ring_color=B5C99A
          path: assets/github-stats.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&bg_color=00000000&title_color=5F7A61&text_color=2F3E2C
          path: assets/top-langs.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg?color_snake=%237CA982&color_dots=%23E9F5DB,%23DDE5B6,%23CFE1B9,%23B5C99A,%237CA982
            assets/github-contribution-grid-snake-dark.svg?color_snake=%23B5C99A&color_dots=%232F3E2C,%234A5D45,%235F7A61,%236B8F71,%237CA982

      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh README assets"
          git push
